name: Build and Deploy Via CLI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build Next.js project
      - name: Build project
        run: |
          npm run build
          # npm run export  # creates out/ folder
        env:
          NODE_ENV: production

      # 5️⃣ Add server to known_hosts
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Clean deploy folder
      - name: Clean server folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}  # deploy user
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf ${{ secrets.DEPLOY_PATH }}/*

      # 7️⃣ Upload static build
      - name: Upload build folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "out/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      # 8️⃣ Change permissions to www
      - name: Change ownership to www
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Fixing ownership for www:www (skipping .user.ini)..."
            find ${{ secrets.DEPLOY_PATH }} -mindepth 1 ! -name ".user.ini" -exec chown -R www:www {} +